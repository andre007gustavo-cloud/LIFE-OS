<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!--
      Arc: r=210, center=(256,256)
      Start (dot, 8h=150°): x=74, y=361
      End  (11h=225°)     : x=108, y=108
      Gradient: navy at arc-end → blue at dot
    -->
    <linearGradient id="arcGrad" gradientUnits="userSpaceOnUse"
                    x1="108" y1="108" x2="74" y2="361">
      <stop offset="0%"   stop-color="#0D1B3E"/>
      <stop offset="42%"  stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- White rounded background (iOS style) -->
  <rect width="512" height="512" rx="80" fill="#FFFFFF"/>

  <!--
    Arc from dot (74,361) CCW (sweep=0) large-arc=1
    Goes: lower-left → bottom → right → top → upper-left
  -->
  <path d="M 74 361 A 210 210 0 1 0 108 108"
        fill="none"
        stroke="url(#arcGrad)"
        stroke-width="22"
        stroke-linecap="round"/>

  <!-- Blue dot at arc start (8 o'clock position) -->
  <circle cx="74" cy="361" r="15" fill="#3B82F6"/>

  <!-- LIFE: dark navy, heavy weight -->
  <text x="256" y="224"
        font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,system-ui,sans-serif"
        font-size="108" font-weight="800"
        fill="#0D1B3E"
        text-anchor="middle"
        dominant-baseline="middle">LIFE</text>

  <!-- OS: blue, lighter weight, slight spacing -->
  <text x="260" y="347"
        font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,system-ui,sans-serif"
        font-size="94" font-weight="400"
        fill="#2563EB"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="6">OS</text>
</svg>
