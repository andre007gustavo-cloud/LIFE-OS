<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="arcGrad" gradientUnits="userSpaceOnUse"
                    x1="130" y1="130" x2="96" y2="356">
      <stop offset="0%"   stop-color="#0D1B3E"/>
      <stop offset="42%"  stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Full bleed white background (maskable: no rounded corners, fills edge to edge) -->
  <rect width="512" height="512" fill="#FFFFFF"/>

  <!--
    Safe zone: center 80% = from 51 to 461.
    Arc scaled slightly smaller to keep content in safe zone.
    r=182, center=(256,256)
    Start (150°): x=256+182*cos(150°)=256-157.6=98.4≈98, y=256+182*sin(150°)=256+91=347
    End  (225°): x=256+182*cos(225°)=256-128.7=127.3≈127, y=256+182*sin(225°)=256-128.7=127
  -->
  <path d="M 98 347 A 182 182 0 1 0 127 127"
        fill="none"
        stroke="url(#arcGrad)"
        stroke-width="20"
        stroke-linecap="round"/>

  <circle cx="98" cy="347" r="13" fill="#3B82F6"/>

  <text x="256" y="224"
        font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,system-ui,sans-serif"
        font-size="98" font-weight="800"
        fill="#0D1B3E"
        text-anchor="middle"
        dominant-baseline="middle">LIFE</text>

  <text x="260" y="338"
        font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,system-ui,sans-serif"
        font-size="84" font-weight="400"
        fill="#2563EB"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="6">OS</text>
</svg>
